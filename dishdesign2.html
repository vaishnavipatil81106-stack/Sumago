<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popular Dishes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

h1{
    text-align:center;
    margin-top:40px;
    margin-bottom:40px;
}

.parent{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:300px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0px 2px 10px rgba(0,0,0,0.15);
    position:relative;
}

.special{
    border:6px solid #ff6b35;
}

.badge{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#ff6b35;
    color:white;
    padding:5px 15px;
    border-radius:20px;
    font-size:12px;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.rating{
    position:absolute;
    top:15px;
    right:15px;
    background:green;
    color:white;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

.content{
    padding:15px;
}

.content h2{
    margin-bottom:10px;
}

.content p{
    color:gray;
    font-size:14px;
    margin-bottom:20px;
}

.child{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.price{
    font-size:30px;
    font-weight:bold;
}

button{
    background:#05ac6c7c;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;

}
.card{
            width: 300px;
            height: 400px;
            border:5px solid rgb(255, 166, 0);
            transition:transform 3s ease-in ;
        }
        .card:hover{
        transform:scale(0.5 );
        }


</style>
</head>

<body>

<h1>Popular Dishes</h1>
<div class="parent">

    
    <div class="card">
        <div class="rating">4.5 ★</div>

        <img src="pizza.webp">

        <div class="content">
            <h2>Farmhouse Pizza</h2>

            <p>
                Cheese burst with fresh veggies and special herbs.
            </p>

            <div class="child">
                <div class="price">Rs.249</div>
                <button>Add to Cart</button>
            </div>
        </div>  
      </div>    

    <div class="card special">

        <div class="badge">BESTSELLER</div>
        <div class="rating">4.8 ★</div>

        <img src="image.png">

        <div class="content">
            <h2>Classic Veg Burger</h2>

            <p>
                Crispy patty with cheese slice and tangy mayo sauce.
            </p>

            <div class="child">
                <div class="price">Rs.149</div>
                <button>Add to Cart</button>
            </div>
        </div>
    </div>

    
    <div class="card">
        <div class="rating">4.3 ★</div>

        <img src="peri peri.webp">

         <div class="content">
            <h2> Peri Peri Fries</h2>
            <p>
                Golden fries tossed in spicy peri peri masala.
            </p>

            <div class="child">
                 <div class="price">Rs.99</div>
                  <button>Add to Cart</button>   
                  </div>             
                </div>
            </div>
