<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .block{
            border: 1px solid blue;
            height: 200px;
          width: 200px;;
        }
        .inline{
            border: 1px solid red;
            display: inline;
            width: 300px;
            height: 400px;
        }

        .inline-block{
  border: 1px solid green;
  display: inline-block;
  width: 300px;
  height: 400px;
        }
        </style>

</head>
<body>
    <div class="block">
   block1
    </div>
    <div class="block">
   block2
    </div><hr>


    <div class="inline">
        inline1
    </div>
    <div class="inline" >
        inline2
    </div><hr>
    <div class="inline-block">
        inline-block1
    </div>
    <div class="inline-block">
        inline-block2
    </div>
    </body>
</html>
